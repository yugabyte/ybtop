<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ybtop viewer</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="toolbar">
    <span class="brand-mark">ybtop</span>
    <span class="brand-sub">viewer</span>
    <span id="ybtop-version" class="brand-version" title="ybtop version">__YBTOP_VERSION__</span>
    <span class="toolbar-snapshot-nav">
      <button type="button" id="btn-prev" title="Previous snapshot (one older)">← Prev</button>
      <button type="button" id="btn-next" title="Next snapshot (one newer)">Next →</button>
    </span>
    <span class="toolbar-nav-gap" aria-hidden="true"></span>
    <span class="toolbar-snapshot-nav">
      <button type="button" id="btn-first" title="Oldest snapshot">First</button>
      <button type="button" id="btn-last" title="Newest snapshot">Last</button>
    </span>
    <span class="nav-label">
      <input type="number" id="nav-jump" class="nav-jump" min="1" value="1"
             title="Type a window number and press Enter" aria-label="Window number" />
      <span id="nav-total" class="nav-total"></span>
      <span id="nav-file" class="nav-file"></span>
    </span>
    <span id="status-msg" class="status"></span>
  </header>
  <main class="app-shell">
    <div id="window-chart" class="window-chart" aria-label="Call rate (calls/s) per window">
      <div class="window-chart-head">
        <button type="button" id="window-chart-toggle" class="window-chart-toggle"
                title="Collapse / expand chart" aria-expanded="true"
                aria-controls="window-chart-body">▼</button>
        <span class="window-chart-title">Call frequency</span>
        <span id="window-chart-status" class="window-chart-status"></span>
      </div>
      <div id="window-chart-body" class="window-chart-body">
        <div id="window-chart-bars" class="window-chart-bars" role="list"></div>
      </div>
    </div>
    <nav id="app-nav" class="app-tabs" role="tablist" aria-label="Data sections"></nav>
    <div id="app" class="app-content"></div>
  </main>
  <footer class="hotkey-tip" aria-label="Keyboard shortcuts">
    <span class="hotkey-tip-label">Tip — window navigation:</span>
    <span class="hotkey"><kbd>←</kbd><kbd>→</kbd> Prev / Next</span>
    <span class="hotkey"><kbd>Home</kbd><kbd>End</kbd> First / Last</span>
    <span class="hotkey"><kbd>g</kbd> jump to window #</span>
  </footer>
  <script src="/static/app.js"></script>
</body>
</html>
